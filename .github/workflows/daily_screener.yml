# =============================================================================
# .github/workflows/daily_screener.yml
# Runs the swing screener every weekday at 4:00 PM IST (10:30 UTC)
# after NSE market closes at 3:30 PM IST
# =============================================================================

name: 📈 Daily Swing Screener

on:
  # Runs Mon–Fri at 10:30 UTC = 4:00 PM IST (30 min after NSE close)
  schedule:
    - cron: "0 9 * * 1-5"

  # Allow manual trigger from GitHub Actions tab
  workflow_dispatch:
    inputs:
      mode:
        description: "Run mode"
        required: false
        default: "full"
        type: choice
        options:
          - full
          - quick

jobs:
  run-screener:
    name: Run NSE Swing Screener
    runs-on: ubuntu-latest

    permissions:
      contents: write   # Needed to commit report back to repo

    steps:
      # -----------------------------------------------------------------------
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      # -----------------------------------------------------------------------
      - name: 🐍 Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # -----------------------------------------------------------------------
      - name: 📦 Install Dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      # -----------------------------------------------------------------------
      - name: 📁 Create output and logs directories
        run: |
          mkdir -p output
          mkdir -p logs

      # -----------------------------------------------------------------------
      - name: 🚀 Run Screener
        run: |
          if [ "${{ github.event.inputs.mode }}" = "quick" ]; then
            python main.py --quick
          else
            python main.py
          fi

      # -----------------------------------------------------------------------
      - name: 📤 Upload Excel Report as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: swing-screener-report-${{ github.run_number }}
          path: |
            output/swing_screener_report.xlsx
            output/swing_screener_report.csv
          retention-days: 30   # Keep last 30 days of reports

      # -----------------------------------------------------------------------
      - name: 📊 Append CSV to historical data (for Power BI)
        run: |
          # If historical CSV exists, append today's run without header
          if [ -f "historical/all_runs.csv" ]; then
            tail -n +2 output/swing_screener_report.csv >> historical/all_runs.csv
          else
            mkdir -p historical
            cp output/swing_screener_report.csv historical/all_runs.csv
          fi

      # -----------------------------------------------------------------------
      - name: 💾 Commit Reports Back to Repo
        run: |
          git config --global user.name  "Swing Screener Bot"
          git config --global user.email "screener-bot@github-actions"

          git add output/swing_screener_report.xlsx
          git add output/swing_screener_report.csv
          git add historical/all_runs.csv

          # Only commit if there are changes
          git diff --staged --quiet || git commit -m "📈 Daily Screener Report — $(TZ='Asia/Kolkata' date +'%d-%b-%Y %H:%M IST')"

          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
     # -----------------------------------------------------------------------
      - name: 📱 Send Telegram Alert
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python telegram_alert.py
      # -----------------------------------------------------------------------
      - name: 📋 Print Run Summary
        if: always()
        run: |
          echo "======================================"
          echo "  Screener Run Complete"
          echo "  Date: $(TZ='Asia/Kolkata' date +'%d-%b-%Y %H:%M IST')"
          echo "  Report: output/swing_screener_report.xlsx"
          echo "======================================"
          # Show top 10 from CSV
          if [ -f output/swing_screener_report.csv ]; then
            echo ""
            echo "Top 10 Picks:"
            head -11 output/swing_screener_report.csv | \
              cut -d',' -f1,2,3,5,6,7,8 | column -t -s','
          fi

      - name: Update Google Sheets
        if: always()
        env:
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_SHEETS_CREDENTIALS: ${{ secrets.GOOGLE_SHEETS_CREDENTIALS }}
        run: python update_sheets.py

